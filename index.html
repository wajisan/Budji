<!doctype html>

<html lang="fr">

<head>
    <meta charset="utf-8">

    <title>Budji</title>
    <meta name="description" content="Budji">
    <meta name="author" content="SiteApp">

    <link rel="stylesheet" href="css/bootstrap.min.css?v=1.0">
    <link rel="stylesheet" href="css/style.css?v=1.0">

</head>

<body>
    <div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow">
        <h5 class="my-0 mr-md-auto font-weight-normal">Budji</h5>
    </div>
    <div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
        <h1 class="display-4">Budji</h1>
        <p class="lead">Conçu pour vous aider à gérer vos budgets, autant réelles que fictives.</p>
    </div>
    <div id="app">
        <div class="container">
            <div class="card-deck mb-3 text-center">
                <div class="card mb-4 box-shadow" v-for="table in tables">
                    <div class="card-header">
                        <h4 class="my-0 font-weight-normal">{{table.name}}</h4>
                    </div>
                    <div class="card-body">
                        <h1 class="card-title pricing-card-title"><span v-bind:class="[getColor(total(table.bills))]">{{total(table.bills)}}</span> € <small class="text-muted"> mois</small></h1>
                        <ul class="list-unstyled mt-3 mb-4 bill">
                            <li v-for="bill in table.bills" v-bind:class="[getColor(bill.value)]">
                                <label>{{bill.label}}</label>{{bill.value}}€
                            </li>
                        </ul>
                        <button type="button" class="btn btn-lg btn-outline-secondary">Modifier</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div>
        <script src="https://cdn.jsdelivr.net/npm/vue"></script>
        <script src="js/main.js"></script>
    </div>
</body>

</html>
